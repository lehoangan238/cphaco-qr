name: Keep Render Awake

on:
  schedule:
    # Every 5 minutes with an offset to avoid the busiest global minute marks.
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  ping-healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Validate healthcheck URL
        run: |
          if [ -z "${{ secrets.RENDER_HEALTHCHECK_URL }}" ]; then
            echo "Missing secret: RENDER_HEALTHCHECK_URL"
            exit 1
          fi

      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 25 "${{ secrets.RENDER_HEALTHCHECK_URL }}?warmup=$(date +%s)" > /dev/null
          echo "Healthcheck ping sent successfully"
